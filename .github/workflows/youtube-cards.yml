name: Update YouTube Cards

on:
  schedule:
    # Se ejecuta cada día a las 00:00 UTC (puedes cambiar el horario)
    - cron: '0 0 * * *'
  workflow_dispatch:  # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate YouTube Cards
        uses: DenverCoder1/readme-youtube-cards@main
        with:
          channel_id: 'UCEI_tlLx1YTscFkO0Uh8uuQ'   # ← pon aquí tu Channel ID
          max_videos: 6                   # cuántos vídeos mostrar
          card_width: 250                 # ancho de cada tarjeta en px
          background_color: '#1a1b26'     # tu color de fondo oscuro
          title_color: '#7dcfff'
          stats_color: '#bb9af7'
          theme: 'dark'                   # ajusta el texto para modo oscuro
          committer_username: 'LowNoise647'
          committer_email: 'adricoding647@gmail.com'
          commit_message: '🔄 Actualizar tarjetas de YouTube'
          readme_path: 'README.md'

      - name: Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🤖 Actualizar vídeos de YouTube'
          branch: main
