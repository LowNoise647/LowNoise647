name: Update YouTube Cards

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate YouTube Cards
        uses: DenverCoder1/readme-youtube-cards@main
        with:
          channel_id: 'UCEI_tlLx1YTscFkO0Uh8uuQ'    # 👈 TU ID DE CANAL
          max_videos: 6
          card_width: 250
          background_color: '#1a1b26'
          title_color: '#7dcfff'
          stats_color: '#bb9af7'
          lang: 'es'
          author_name: 'LowNoise647'
          author_email: 'adricoding647@gmail.com'
          commit_message: '🔄 Actualizar tarjetas de YouTube'
          readme_path: 'README.md'

      # El siguiente paso lo hace automáticamente la acción, pero podemos forzarlo si queremos:
      # (opcional) 
      # - name: Push changes
      #   uses: stefanzweifel/git-auto-commit-action@v5
      #   with:
      #     commit_message: '🤖 Actualizar vídeos de YouTube'
      #     branch: main
